# Google Markdown Style Guide Configuration
# https://google.github.io/styleguide/docguide/style.html

[global]
line_length = 80

[MD003]
style = "atx"

[MD004]
style = "dash"

[MD007]
indent = 4

[MD009]
strict = true

[MD029]
style = "one_or_ordered"

[MD030]
ul_single = 1
ul_multi = 1
ol_single = 1
ol_multi = 1

[MD033]
allowed-elements = ["p", "a", "img"]

[MD046]
style = "fenced"
